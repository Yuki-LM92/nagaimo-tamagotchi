<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ながいもくん 🌿</title>
  <!-- PWA -->
  <meta name="theme-color" content="#b48ef0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ながいもくん">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/nagaimo.svg">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
             img-src 'self' data: blob:;
             connect-src https://generativelanguage.googleapis.com;
             font-src 'self' https://fonts.gstatic.com;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- APIキー設定画面 -->
  <div id="setup-screen">
    <div class="setup-box">
      <div class="setup-char">🌿</div>
      <h2>はじめまして！</h2>
      <p>おれ、ながいもくん。<br>話しかけてくれるとめちゃ嬉しい。</p>
      <p class="setup-note">Gemini APIキーを入力してはじめよう</p>
      <input
        type="password"
        id="api-key-input"
        placeholder="AIzaSy..."
        autocomplete="off"
      />
      <button id="save-api-key-btn">はじめる</button>
      <p class="setup-hint">APIキーはこのブラウザにのみ保存されます</p>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="app" class="hidden">

    <!-- ヘッダー -->
    <header id="app-header">
      <span class="header-title">ながいもくん 🌿</span>
      <button id="settings-btn" title="設定">⚙️</button>
    </header>

    <!-- キャラクターエリア -->
    <section id="character-area">
      <!-- シーン背景 -->
      <div id="scene-bg" class="scene-farm"></div>
      <!-- 背景セレクター -->
      <div id="bg-selector" role="group" aria-label="背景を選ぶ">
        <button class="bg-btn" data-scene="scene-farm"  title="畑">🌾</button>
        <button class="bg-btn" data-scene="scene-flowers" title="お花畑">🌸</button>
        <button class="bg-btn" data-scene="scene-space"  title="宇宙">🌌</button>
        <button class="bg-btn" data-scene="scene-night"  title="夜">🌙</button>
        <button class="bg-btn" data-scene="scene-cyber"  title="サイバー">💻</button>
        <button class="bg-btn" data-scene="scene-beach" title="ビーチ">🌊</button>
      </div>
      <!-- VTuberフレーム -->
      <div id="vtube-frame" aria-hidden="true">
        <div class="vf-corner tl"></div>
        <div class="vf-corner tr"></div>
        <div class="vf-corner bl"></div>
        <div class="vf-corner br"></div>
        <div id="live-badge"><span class="live-dot"></span>LIVE</div>
        <div id="theme-label"></div>
      </div>

      <!-- ステータスバー（HP/MP） -->
      <div id="status-bar" aria-hidden="true">
        <div class="px-stat">
          <span class="px-stat-label">HP</span>
          <div class="px-stat-bar"><div class="px-stat-fill hp-fill"></div></div>
        </div>
        <div class="px-stat">
          <span class="px-stat-label">MP</span>
          <div class="px-stat-bar"><div class="px-stat-fill mp-fill"></div></div>
        </div>
      </div>

      <!-- 吹き出し（character-area上部に配置 → キャラと重ならない） -->
      <div id="speech-bubble" class="hidden">
        <span id="speech-text"></span>
      </div>

      <div id="character-stage">
        <!-- キャラ本体 -->
        <div id="character-wrapper">
          <img id="character" src="assets/nagaimo.svg" alt="ながいもくん" draggable="false"/>
        </div>
        <!-- 感情オーバーレイ -->
        <div id="emotion-overlay" aria-hidden="true"></div>
        <!-- 考え中インジケーター -->
        <div id="thinking-dots" class="hidden">
          <span></span><span></span><span></span>
        </div>
      </div>
    </section>

    <!-- チャット履歴 -->
    <section id="chat-section">
      <div id="messages"></div>
    </section>

    <!-- 入力エリア -->
    <footer id="input-area">
      <!-- スタンプバー -->
      <div id="stamps-bar" role="group" aria-label="スタンプ">
        <button class="stamp" data-msg="🌿" title="長芋">🌿</button>
        <button class="stamp" data-msg="💪" title="がんばれ">💪</button>
        <button class="stamp" data-msg="✨" title="すごい">✨</button>
        <button class="stamp" data-msg="🍠" title="芋">🍠</button>
        <button class="stamp" data-msg="😊" title="嬉しい">😊</button>
        <button class="stamp" data-msg="🎉" title="おめでとう">🎉</button>
        <button class="stamp" data-msg="🤔" title="考え中">🤔</button>
        <button class="stamp" data-msg="😭" title="つらい">😭</button>
      </div>
      <!-- 入力行 -->
      <div id="input-row">
        <input
          type="text"
          id="user-input"
          placeholder="話しかける..."
          autocomplete="off"
          maxlength="500"
        />
        <button id="send-btn">送る</button>
      </div>
    </footer>

  </div>

  <!-- 設定モーダル -->
  <div id="settings-modal" class="hidden">
    <div class="modal-box">
      <h3>設定</h3>

      <!-- キャラ着せ替え -->
      <div class="settings-char">
        <label>キャラ画像を変更</label>
        <div class="char-upload-row">
          <img id="char-preview" src="assets/nagaimo.svg" alt="キャラプレビュー">
          <div class="char-upload-actions">
            <label class="btn-upload" for="char-file-input">
              📷 画像を選ぶ
              <input type="file" id="char-file-input" accept="image/*" style="display:none">
            </label>
            <button id="char-reset-btn" class="secondary">リセット</button>
          </div>
        </div>
      </div>

      <div class="settings-divider"></div>

      <label>APIキーを変更</label>
      <input type="password" id="settings-api-input" placeholder="新しいAPIキー"/>
      <div class="modal-actions">
        <button id="settings-save-btn">保存</button>
        <button id="settings-test-btn" class="secondary">APIテスト</button>
        <button id="settings-clear-btn" class="danger">会話履歴を消す</button>
        <button id="settings-close-btn" class="secondary">閉じる</button>
      </div>
      <div id="api-test-result" style="display:none;margin-top:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span id="api-test-label" style="font-size:0.65rem;color:#aaa;">結果</span>
          <button id="api-test-copy-btn" style="font-size:0.6rem;padding:2px 6px;">コピー</button>
        </div>
        <div id="api-test-text" style="padding:8px;background:#111;color:#0f0;font-size:0.65rem;word-break:break-all;border:1px solid #333;max-height:120px;overflow-y:auto;border-radius:4px;white-space:pre-wrap;"></div>
      </div>
    </div>
  </div>

  <script src="particles.js"></script>
  <script src="memory.js"></script>
  <script src="character.js"></script>
  <script src="gemini.js"></script>
  <script src="app.js"></script>
</body>
</html>
